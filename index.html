                tg.close(); // បិទផ្ទាំង Web App
            } else {
                alert("មានបញ្ហាក្នុងការផ្ញើ!");
            }
        })
        .catch(err => console.error(err));

    } else {
        alert("សូមបំពេញព័ត៌មានឱ្យបានគ្រប់គ្រាន់!");
    }
}
